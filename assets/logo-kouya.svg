<svg xmlns="http://www.w3.org/2000/svg" width="260" height="96" viewBox="0 0 260 96">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&amp;display=swap');
    </style>
  </defs>
  <!-- Star / Big Dipper icon -->
  <g transform="translate(20,18)">
    <circle cx="0"  cy="0"  r="2.2" fill="#c7a670"/>
    <circle cx="10" cy="-6" r="2.2" fill="#c7a670"/>
    <circle cx="20" cy="-10" r="2.2" fill="#c7a670"/>
    <circle cx="30" cy="-6" r="2.2" fill="#c7a670"/>
    <circle cx="30" cy="6"  r="2.5" fill="#c7a670"/>
    <circle cx="20" cy="14" r="2.5" fill="#c7a670"/>
    <circle cx="10" cy="14" r="2.5" fill="#c7a670"/>
    <polyline points="0,0 10,-6 20,-10 30,-6 30,6 20,14 10,14" fill="none" stroke="#c7a670" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- KOUYA text -->
  <text x="68" y="42" font-family="Cinzel, Georgia, serif" font-size="28" font-weight="600" letter-spacing="6" fill="#f2ede3">KOUYA</text>
  <!-- Divider line -->
  <line x1="68" y1="52" x2="252" y2="52" stroke="#c7a670" stroke-width="0.6" opacity="0.6"/>
  <!-- BIG DIPPER DESIGN -->
  <text x="68" y="68" font-family="Cinzel, Georgia, serif" font-size="9" font-weight="500" letter-spacing="3.5" fill="#c7a670">BIG DIPPER DESIGN</text>
</svg>
